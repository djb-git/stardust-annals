<script>
(function() {
	var input = document.getElementById('kira-search-input-right');
	var results = document.getElementById('kira-search-results-right');
	var posts = [];
	var timer;

	fetch('/stardust-annals/search.json')
		.then(function(r) { return r.json(); })
		.then(function(d) { posts = d; });

	input.addEventListener('input', function() {
		clearTimeout(timer);
		var q = this.value.trim();
		if (!q) { results.innerHTML = ''; results.style.display = 'none'; return; }
		if (!posts.length) return;
		timer = setTimeout(function() {
			var ql = q.toLowerCase();
			var list = posts.filter(function(p) {
				return p.title.toLowerCase().indexOf(ql) > -1;
			}).slice(0, 8);
			if (!list.length) {
				results.innerHTML = '<div class="kira-search-noresult">无结果</div>';
				results.style.display = 'block';
				return;
			}
			var html = '';
			list.forEach(function(p) {
				html += '<a href="' + p.url + '">' + p.title + '</a>';
			});
			results.innerHTML = html;
			results.style.display = 'block';
		}, 200);
	});

	document.addEventListener('click', function(e) {
		if (!e.target.closest('.kira-right-search')) {
			results.style.display = 'none';
		}
	});

	document.addEventListener('keydown', function(e) {
		if (e.key === 'Escape' && document.activeElement === input) {
			input.value = '';
			results.style.display = 'none';
			input.blur();
		}
	});
})();
</script>

	<script>
		(function() {
			var toggle = document.getElementById('darkToggle');
			var html = document.documentElement;
			var saved = localStorage.getItem('kira-theme');
			if (saved === 'dark') html.setAttribute('data-theme', 'dark');
			toggle.addEventListener('click', function() {
				var isDark = html.getAttribute('data-theme') === 'dark';
				if (isDark) {
					html.removeAttribute('data-theme');
					localStorage.setItem('kira-theme', 'light');
				} else {
					html.setAttribute('data-theme', 'dark');
					localStorage.setItem('kira-theme', 'dark');
				}
			});
		})();
